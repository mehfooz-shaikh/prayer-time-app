<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Time App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Prayer Times</h1>
        <p class="subtitle">Enter your city to get today's prayer times</p>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name... e.g. Mumbai" />
            <button onclick="getPrayerTimes()">Get Times</button>
        </div>

        <div id="error" class="error"></div>

        <div id="result" class="result hidden">
            <h2 id="cityName"></h2>
            <p id="dateDisplay"></p>
            <div class="prayer-grid">
                <div class="prayer-card">
                    <span class="prayer-name">Fajr</span>
                    <span class="prayer-time" id="fajr"></span>
                </div>
                <div class="prayer-card">
                    <span class="prayer-name">Dhuhr</span>
                    <span class="prayer-time" id="dhuhr"></span>
                </div>
                <div class="prayer-card">
                    <span class="prayer-name">Asr</span>
                    <span class="prayer-time" id="asr"></span>
                </div>
                <div class="prayer-card">
                    <span class="prayer-name">Maghrib</span>
                    <span class="prayer-time" id="maghrib"></span>
                </div>
                <div class="prayer-card">
                    <span class="prayer-name">Isha</span>
                    <span class="prayer-time" id="isha"></span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
